#  alembic.ini — Configuration d'Alembic (migrations de base de données)
#  Alembic gère les changements de structure de la base de données.
#  Chaque modification de table = une nouvelle migration.
#
#  Commandes utiles :
#    alembic upgrade head          → Applique toutes les migrations
#    alembic downgrade -1          → Annule la dernière migration
#    alembic revision --autogenerate -m "nom" → Crée une migration
#    alembic history               → Voir l'historique

[alembic]
# Chemin vers le dossier contenant les fichiers de migration
script_location = alembic

# Format du nom des fichiers de migration
# Ex: 20260101_120000_ajouter_table_vaccins.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# URL de connexion à la base de données
# Peut être surchargée dans alembic/env.py pour lire depuis .env
sqlalchemy.url = postgresql://postgres:postgres@postgres:5432/sante_integree

[post_write_hooks]
# Pas de formatage automatique (optionnel : ajouter black/ruff ici)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
