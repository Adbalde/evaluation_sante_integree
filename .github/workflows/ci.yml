name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  lint-backend:
    name: 🔍 Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8

      - name: Flake8
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --ignore=E501,W503 --statistics

      - name: Vérifier les imports Python
        run: |
          cd backend
          python -c "
          from app.models   import Base, User, Patient, Consultation, AuditLog, ActionEnum, SexeEnum
          from app.schemas  import PatientCreate, ConsultationCreate, Token, PatientPage, ConsultationPage
          from app.auth     import hash_password, verify_password, create_access_token
          from app.database import engine, get_db
          print('✅ Tous les imports OK')
          "
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test"
          SECRET_KEY:   "cle-de-test-ci"

  test-backend:
    name: 🧪 Tests Backend
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       sante_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances + pytest
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Créer les tables + tester le démarrage
        env:
          DATABASE_URL:    "postgresql://test:test@localhost:5432/sante_test"
          SECRET_KEY:      "cle-de-test-ci-uniquement"
          ADMIN_PASSWORD:  "TestAdmin123!"
          AGENT_PASSWORD:  "TestAgent123!"
        run: |
          cd backend
          python -c "
          from app.database import Base, engine
          from app import models
          Base.metadata.create_all(bind=engine)
          from app.database import SessionLocal
          from app.auth import hash_password
          db = SessionLocal()
          admin = models.User(
              username='admin', email='admin@test.local',
              hashed_password=hash_password('Admin1234!'),
              role=models.RoleEnum.admin, is_active=True
          )
          db.add(admin)
          db.commit()
          count = db.query(models.User).count()
          assert count == 1, f'Attendu 1 user, trouvé {count}'
          db.close()
          print('✅ Base de données et modèles fonctionnels')
          "

          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short
          else
            echo "ℹ️ Pas encore de dossier tests/"
          fi

  build-backend:
    name: 🐳 Build Backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v5
        with:
          context:    ./backend
          push:       false
          tags:       sante-backend:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  build-frontend:
    name: 🐳 Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          push:       false
          tags:       sante-frontend:ci
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to:   type=gha,mode=max
