# ──────────────────────────────────────────────────────────────
#  Dependabot — Mises à jour automatiques des dépendances
#  Crée des PR automatiques chaque semaine pour les nouvelles
#  versions de dépendances Python et npm
# ──────────────────────────────────────────────────────────────

version: 2

updates:

  # ── Dépendances Python (backend) ─────────────────────────
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Africa/Conakry
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # ── Dépendances npm (frontend) ────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Africa/Conakry
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"

  # ── Actions GitHub ────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
