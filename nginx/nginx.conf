upstream backend  { server backend:8000; }
upstream frontend { server frontend:80;  }
upstream dhis2    { server dhis2:8080;   }

server {
    listen 80;
    server_name vps-27978dbd.vps.ovh.net 51.178.143.214;
    return 301 https://vps-27978dbd.vps.ovh.net$request_uri;
}

server {
    listen 443 ssl;
    server_name vps-27978dbd.vps.ovh.net;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;
    server_tokens off;

    add_header X-Frame-Options         "SAMEORIGIN"         always;
    add_header X-Content-Type-Options  "nosniff"            always;
    add_header X-XSS-Protection        "1; mode=block"      always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Bloquer les fichiers sensibles ────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        return 404;
    }
    location ~ \.(env|yml|yaml|php|conf|sql|bak)$ {
        return 404;
    }

    # ── API Backend ───────────────────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass            http://backend;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }

    location /docs {
        proxy_pass http://backend/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend/redoc;
        proxy_set_header Host $host;
    }

    # ── DHIS2 entry point ─────────────────────────────────────────────

    location /dhis2/ {
    rewrite ^/dhis2/(.*)$ /$1 break;
    proxy_pass            http://dhis2;
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto https;
    proxy_set_header      X-Forwarded-Prefix /dhis2;

    proxy_redirect http://dhis2:8080/
                   https://vps-27978dbd.vps.ovh.net/dhis2/;
    proxy_redirect http://vps-27978dbd.vps.ovh.net/
                   https://vps-27978dbd.vps.ovh.net/dhis2/;
    proxy_redirect ~^https://vps-27978dbd\.vps\.ovh\.net/$
                   https://vps-27978dbd.vps.ovh.net/dhis2/;

    proxy_read_timeout      180s;
    proxy_connect_timeout   30s;
    proxy_buffer_size       128k;
    proxy_buffers           8 256k;
    proxy_busy_buffers_size 512k;
}

# Redirige les bare paths DHIS2 vers /dhis2/ prefix
location ~ ^/dhis-web- {
    return 302 https://vps-27978dbd.vps.ovh.net/dhis2$request_uri;
}







    # ── Frontend React ────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
