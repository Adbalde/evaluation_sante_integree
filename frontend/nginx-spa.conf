# ──────────────────────────────────────────────────────────────────────────────
#  nginx-spa.conf — Configuration Nginx pour l'application React (SPA)
#  Problème résolu : React Router utilise des URLs comme /patients/5
#  qui n'existent pas en tant que fichiers physiques.
#  Nginx doit toujours servir index.html et laisser React gérer la route.
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    # Racine des fichiers statiques (build React)
    root /usr/share/nginx/html;

    # ── Compression gzip ──────────────────────────────────────
    # Réduit la taille des fichiers transférés (jusqu'à 70% de gain)
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
    gzip_vary       on;

    # ── Fichiers statiques ────────────────────────────────────
    # Les assets (JS, CSS, images) sont en cache 1 an
    # (Vite génère des noms uniques à chaque build, pas de conflit)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # ── Application React (SPA) ───────────────────────────────
    # IMPORTANT : try_files redirige toute URL inconnue vers index.html
    # React Router s'occupe ensuite d'afficher la bonne page
    # Sans cette ligne : /patients/5 → 404 Nginx
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Sécurité ──────────────────────────────────────────────
    # Désactive les informations sur la version de Nginx
    server_tokens off;
}
